name: Dependency vulnerability scan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  schedule:
    # Re-scan the locked dependency graph after advisory databases change,
    # even when the repository itself has not received a commit.
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-current-lockfiles:
    name: Scan current dependency graph
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    # OSV-Scanner action v2.3.8, pinned to the immutable reusable-workflow
    # revision referenced by its signed release.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@3adb4b14a2b0623876d18d863a498b785fb3752d
    with:
      scan-args: |-
        --recursive
        ./

  scan-pull-request-delta:
    name: Reject newly introduced vulnerabilities
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    # OSV-Scanner action v2.3.8, pinned to the immutable reusable-workflow
    # revision referenced by its signed release.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a
    with:
      scan-args: |-
        --recursive
        ./
